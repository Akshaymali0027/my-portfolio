<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akshay Mali | Next Level Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#050816;
  color:white;
  overflow-x:hidden;
}

/* PARTICLES */
.particle{
  position:absolute;
  width:6px;
  height:6px;
  background:#60a5fa;
  border-radius:50%;
  animation:float 8s linear infinite;
  opacity:0.5;
}

@keyframes float{
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-10vh);}
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.hero h1{
  font-size:65px;
  background:linear-gradient(90deg,#60a5fa,#a78bfa,#22c55e);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.typing{
  font-size:22px;
  margin-top:10px;
  color:#cbd5e1;
  border-right:2px solid #60a5fa;
  white-space:nowrap;
  overflow:hidden;
}

/* BUTTONS */
.btns{
  margin-top:25px;
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.btn{
  padding:12px 20px;
  border-radius:10px;
  text-decoration:none;
  font-weight:600;
  transition:0.3s;
  border:1px solid rgba(255,255,255,0.1);
}

.btn:hover{
  transform:scale(1.1);
  background:#2563eb;
}

/* CARDS */
section{
  padding:80px 10%;
}

.title{
  text-align:center;
  font-size:38px;
  color:#60a5fa;
  margin-bottom:30px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  padding:25px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
  border-color:#60a5fa;
  box-shadow:0 0 20px #2563eb;
}

/* SKILLS */
.skill{
  margin-bottom:15px;
}

.bar{
  height:10px;
  background:#1e293b;
  border-radius:20px;
  overflow:hidden;
}

.fill{
  height:100%;
  background:linear-gradient(90deg,#60a5fa,#22c55e);
}

/* SOCIAL */
.socials{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
  margin-top:20px;
}

.socials a{
  padding:10px 15px;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
  color:white;
  text-decoration:none;
  transition:0.3s;
}

.socials a:hover{
  background:#22c55e;
  transform:translateY(-5px);
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">

<h1>Akshay Kumar Mali</h1>

<div class="typing" id="typing"></div>

<p style="margin-top:15px;color:#94a3b8;max-width:600px;">
Ultra Modern Developer Portfolio | Student | Editor | Creator
</p>

<div class="btns">
<a class="btn" href="https://github.com/Akshaymali0027">GitHub</a>
<a class="btn" href="mailto:akshaymali0027@gmail.com">Email</a>
<a class="btn" href="#">Resume</a>
</div>

<div class="socials">
<a href="https://www.instagram.com/akshay_p_mali/">Instagram</a>
<a href="https://linkedin.com/in/akshay-mali-b06499411">LinkedIn</a>
<a href="https://www.youtube.com/@Music8D_Ak/">YouTube</a>
</div>

</div>

<!-- ABOUT -->
<section>
<div class="title">About Me</div>
<div class="grid">
<div class="card">Student from Rajasthan learning tech & editing.</div>
<div class="card">Love coding, editing and building websites.</div>
</div>
</section>

<!-- SKILLS -->
<section>
<div class="title">Skills</div>

<div class="card">
Video Editing
<div class="bar"><div class="fill" style="width:85%"></div></div>
</div>

<div class="card">
Computer Skills
<div class="bar"><div class="fill" style="width:75%"></div></div>
</div>

<div class="card">
Communication
<div class="bar"><div class="fill" style="width:70%"></div></div>
</div>

</section>

<script>

// typing effect
const texts = [
"Student",
"Video Editor",
"Tech Enthusiast",
"Future Developer"
];

let i=0, j=0;
let currentText="";
let isDeleting=false;

function type(){
  currentText = texts[i];

  if(!isDeleting){
    document.getElementById("typing").innerHTML = currentText.substring(0,j++);
    if(j>currentText.length){
      isDeleting=true;
      setTimeout(type,1000);
      return;
    }
  } else {
    document.getElementById("typing").innerHTML = currentText.substring(0,j--);
    if(j<0){
      isDeleting=false;
      i=(i+1)%texts.length;
    }
  }

  setTimeout(type,100);
}

type();

// particles
for(let i=0;i<25;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=(Math.random()*5+3)+"s";
  document.body.appendChild(p);
}

</script>

</body>
</html>
